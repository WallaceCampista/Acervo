<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="confirm" id="acervo-modal" class="modal-backdrop" hidden aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true"
         aria-labelledby="acervo-modal-title" aria-describedby="acervo-modal-message">
        <h3 id="acervo-modal-title" class="modal-title">Confirmar</h3>
        <p id="acervo-modal-message" class="modal-message"></p>
        <div class="modal-actions">
            <button type="button" id="acervo-modal-cancel" class="btn-outline"
                    th:text="#{modal.cancel}"
                    onclick="AcervoModal.hide()">Cancelar</button>
            <button type="button" id="acervo-modal-confirm" class="btn-danger">Confirmar</button>
        </div>
    </div>
</div>
</body>
</html>
