services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: acervo-postgres-prod
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-acervo}
      POSTGRES_USER: ${POSTGRES_USER:-acervo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD obrigatório}
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-acervo} -d ${POSTGRES_DB:-acervo}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: acervo:latest
    container_name: acervo-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-acervo}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-acervo}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD obrigatório}
      ACERVO_AI_BASE_URL: ${ACERVO_AI_BASE_URL:?ACERVO_AI_BASE_URL obrigatório (ex: http://host.docker.internal:1234)}
      ACERVO_AI_API_KEY: ${ACERVO_AI_API_KEY:-lm-studio}
      ACERVO_CHAT_MODEL: ${ACERVO_CHAT_MODEL:?ACERVO_CHAT_MODEL obrigatório}
      ACERVO_EMBEDDING_MODEL: ${ACERVO_EMBEDDING_MODEL:?ACERVO_EMBEDDING_MODEL obrigatório}
      ACERVO_EMBEDDING_DIMENSIONS: ${ACERVO_EMBEDDING_DIMENSIONS:-768}
      STORAGE_DIR: /opt/acervo/data/uploads
      JAVA_OPTS: ${JAVA_OPTS:--XX:MaxRAMPercentage=75.0}
    ports:
      - "${APP_PORT:-8080}:8080"
    volumes:
      - uploads:/opt/acervo/data/uploads
    restart: unless-stopped

volumes:
  pg-data:
  uploads:
